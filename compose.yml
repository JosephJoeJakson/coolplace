services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: supersecret
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: ./server
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PORT: 3000
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: supersecret
      PGDATABASE: postgres
      SESSION_SECRET: superlongstring
    ports:
      - "3000:3000"

  client:
    build: ./client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "8080:80"

volumes:
  pgdata:
